<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InventoRISDA v3.22 | RISDA Kedah</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#006837">
    
    <style>
  :root { --primary-color: #006837; --bg-gradient: linear-gradient(135deg, #e9ecef 0%, #cbd3da 100%); }
  
  /* 🟢 DIBETULKAN: Tukar overflow: hidden kepada overflow-y: auto supaya boleh skrol */
  body, html { margin: 0; padding: 0; min-height: 100%; font-family: 'Segoe UI', sans-serif; background: var(--bg-gradient); overflow-y: auto; }

  /* 🟢 DIBETULKAN: Padam position absolute, dan tambah padding supaya tak rapat ke skrin */
  #loginContainer { display: flex; justify-content: center; align-items: center; min-height: 100vh; width: 100%; padding: 20px; box-sizing: border-box; background: var(--bg-gradient); }

  .login-card { background: white; border-radius: 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); width: 100%; max-width: 850px; display: flex; overflow: hidden; flex-wrap: wrap; }

  .login-form { flex: 1; padding: 40px; text-align: center; min-width: 300px; box-sizing: border-box; }
  .logo-img { width: 110px; margin-bottom: 20px; filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.1)); }
  input { width: 100%; padding: 18px; border: 2px solid #dfe6e9; border-radius: 16px; font-size: 16px; margin-bottom: 20px; box-sizing: border-box; text-align: center; font-weight: bold; }
  input:focus { border-color: var(--primary-color); outline: none; }
  button { width: 100%; padding: 18px; background: #006837; color: white; border: none; border-radius: 16px; font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,104,55,0.3); }
  button:hover { background: #004d29; transform: translateY(-2px); }
  button:disabled { background: #636e72; cursor: not-allowed; }

  .notice-board { flex: 1; background: #f8f9fa; padding: 40px; border-left: 2px dashed #dee2e6; min-width: 300px; box-sizing: border-box; position: relative; overflow: hidden; }
  .notice-title { color: #006837; font-size: 22px; font-weight: 800; margin-top: 0; border-bottom: 3px solid #c6a355; padding-bottom: 10px; display: inline-block; margin-bottom: 20px; }

  .scrolling-text { height: 250px; overflow: hidden; position: relative; }
  .scrolling-content { animation: scrollUp 15s linear infinite; }
  .scrolling-content:hover { animation-play-state: paused; }

  .notice-item { background: white; padding: 15px; border-radius: 10px; border-left: 5px solid #c6a355; margin-bottom: 15px; font-size: 14.5px; color: #495057; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: left; line-height: 1.5; }
  .notice-date { font-size: 11px; color: #999; font-weight: bold; display: block; margin-bottom: 5px; }

  @keyframes scrollUp {
    0% { transform: translateY(100%); }
    100% { transform: translateY(-100%); }
  }

  #appFrame { border: none; width: 100%; height: 100%; display: none; position: absolute; top: 0; left: 0; z-index: 5; }

  /* 🟢 KOD BARU: Khas untuk Telefon Pintar (Mobile Responsive) */
  @media (max-width: 768px) {
    .login-form { padding: 30px 20px; }
    .logo-img { width: 95px; margin-bottom: 10px; }
    input, button { padding: 15px; font-size: 15px; margin-bottom: 15px; }
    
    /* Bila di telefon, border putus-putus pindah ke atas */
    .notice-board { padding: 30px 20px; border-left: none; border-top: 2px dashed #dee2e6; } 
    
    /* Ruang pengumuman direndahkan sikit supaya tak terlalu panjang di skrin telefon */
    .scrolling-text { height: 180px; } 
  }
</style>
</head>
<body>

    <div id="loginContainer">
        <div class="login-card">
            <div class="login-form">
                <img src="https://i.ibb.co/3yrQJvX0/logo-risda-gold-emboss-removebg-preview.png" alt="RISDA" class="logo-img">
                <h2 style="margin:0; color:#333;">InventoRISDA <span style="font-size:12px; background:#006837; color:white; padding:2px 8px; border-radius:10px; vertical-align: middle;">v3.22</span></h2>
                <p style="color:#636e72; margin: 10px 0 30px; font-size: 14px;">Sistem Inventori Alat Tulis RISDA Kedah</p>

                <input type="email" id="emailInput" placeholder="Emel @risda.gov.my" inputmode="email">
                <button id="loginBtn" onclick="masukSistem()">Log Masuk</button>
            </div>
            
            <div class="notice-board">
                <h3 class="notice-title">📢 Pengumuman Semasa</h3>
                <div class="scrolling-text">
                    <div class="scrolling-content">
                        <div class="notice-item">
                            <span class="notice-date">11 April 2026</span>
                            Permohonan stok alat tulis bagi bulan April kini dibuka. Sila berjimat cermat.
                        </div>
                        <div class="notice-item">
                            <span class="notice-date">INFO SISTEM</span>
                            <strong>Sistem InventoRISDA v3.22</strong> kita sedang diintegrasikan dengan Agen AI pintar. Nantikan kemunculannya!
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <iframe id="appFrame" allow="geolocation; microphone; camera"></iframe>

    <script>
        const URL_SISTEM = "https://script.google.com/macros/s/AKfycbyetorELLyy_8C2cGJaRpp-WOCcbCZoGlZ4MUjWVSsmIrMsvjeV_Sv6xFJd7u4KUkze/exec";

        window.onload = () => {
            // Pembersihan jika ada parameter refresh
            if (window.location.search.includes('refresh')) {
                localStorage.removeItem("inventorisda_email");
                document.getElementById('emailInput').value = "";
                window.history.replaceState({}, document.title, window.location.pathname);
            } else {
                const savedEmail = localStorage.getItem("inventorisda_email");
                if (savedEmail) document.getElementById('emailInput').value = savedEmail;
            }
        };

        function masukSistem() {
            const emailInput = document.getElementById('emailInput');
            const email = emailInput.value.toLowerCase().trim();
            const btn = document.getElementById('loginBtn');

            // Validasi asas
            if (!email || !email.includes('@')) {
                return alert("Sila masukkan emel yang sah!");
            }

            // Simpan emel dalam memori telefon
            localStorage.setItem("inventorisda_email", email);

            // Tukar rupa butang
            btn.innerText = "Membawa anda masuk...";
            btn.disabled = true;
            
            // 🟢 LOGIK BAHARU (DIRECT REDIRECT)
            // KITA BUANG TERUS IFRAME. Bawa pengguna terus ke server Google
            window.location.href = URL_SISTEM + "?userEmail=" + encodeURIComponent(email);
        }
    </script>
</body>
</html>
