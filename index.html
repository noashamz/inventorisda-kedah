<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InventoRISDA v3.22 | RISDA Kedah</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0056b3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --primary-color: #0056b3;
            --primary-dark: #003d80;
            --bg-gradient: linear-gradient(135deg, #e9ecef 0%, #cbd3da 100%);
            --text-dark: #2d3436;
            --text-light: #636e72;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* Mengelakkan scrolling pada mobile */
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 30px;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            width: 85%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .logo-img {
            width: 110px;
            height: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.08));
        }

        h2 {
            margin: 0;
            color: var(--text-dark);
            font-size: 26px;
            letter-spacing: -0.5px;
        }

        .version-badge {
            font-size: 11px;
            background: var(--primary-color);
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            vertical-align: middle;
            font-weight: 600;
        }

        p.subtitle {
            color: var(--text-light);
            font-size: 15px;
            line-height: 1.4;
            margin: 12px 0 32px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input[type="email"] {
            width: 100%;
            padding: 18px;
            border: 2px solid #dfe6e9;
            border-radius: 16px;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            background: #fdfdfd;
            -webkit-appearance: none; /* Buang shadow dalam iOS */
        }

        input[type="email"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(0, 86, 179, 0.1);
            background: #fff;
        }

        button {
            width: 100%;
            padding: 18px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(0, 86, 179, 0.2);
        }

        button:active {
            transform: scale(0.96);
            background-color: var(--primary-dark);
        }

        button:disabled {
            background-color: #a5b1c2;
            cursor: not-allowed;
        }

        #message {
            margin-top: 20px;
            font-size: 14px;
            min-height: 22px;
            font-weight: 500;
        }

        .footer {
            margin-top: 35px;
            font-size: 10px;
            color: #95a5a6;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        /* Responsif tambahan untuk skrip kecil (seperti iPhone SE) */
        @media (max-height: 600px) {
            .login-card { padding: 25px 20px; }
            .logo-img { width: 80px; }
            h2 { font-size: 22px; }
            p.subtitle { margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="logo-risda.png" alt="RISDA" class="logo-img" onerror="this.src='https://via.placeholder.com/120?text=RISDA'">
        
        <h2>InventoRISDA <span class="version-badge">v3.22</span></h2>
        <p class="subtitle">Sistem Pengurusan Inventori Alat Tulis <br><strong>RISDA Negeri Kedah</strong></p>

        <div class="input-group">
            <input type="email" id="emailInput" 
                   placeholder="Emel Rasmi (@risda.gov.my)" 
                   autocomplete="email" 
                   inputmode="email">
        </div>

        <button id="loginBtn" onclick="prosesLogin()">Log Masuk</button>

        <div id="message"></div>

        <div class="footer">
            &copy; 2026 RISDA KEDAH | Versi Percubaan (Pilot Test)
        </div>
    </div>

    <script>
        const senaraiPegawai = [
            "a.s.syahir@risda.gov.my", "anuar.aziz@risda.gov.my", "marliana@risda.gov.my",
            "rodzi@risda.gov.my", "hakim.yussoff@risda.gov.my", "mohamad_fahmi@risda.gov.my",
            "mohammad.fariq@risda.gov.my", "noor_ajifuddin@risda.gov.my", "husaini@risda.gov.my",
            "mohd.aiman@risda.gov.my", "mohd.alif@risda.gov.my", "amirul.ashraf@risda.gov.my",
            "mohd.anas@risda.gov.my", "asyraf@risda.gov.my", "m.basyiruddin@risda.gov.my",
            "firdaous@risda.gov.my", "mohd.hafis@risda.gov.my", "najib.hamdi@risda.gov.my",
            "mohd.nazif@risda.gov.my", "mohdrosli@risda.gov.my", "saiful_asyraf@risda.gov.my",
            "sayuthi@risda.gov.my", "shahril.shahrom@risda.gov.my", "zaiful@risda.gov.my",
            "mohd.zuhairi@risda.gov.my", "najmuddin@risda.gov.my", "afiq.abdulrahman@risda.gov.my",
            "m.zulhilmi@risda.gov.my", "nabila.hajar@risda.gov.my", "n.azah@risda.gov.my",
            "n.shazliza@risda.gov.my", "nor.fahmiza@risda.gov.my", "norhasmiza@risda.gov.my",
            "nuraina@risda.gov.my", "izzatie@risda.gov.my", "fatini.shahidan@risda.gov.my",
            "rohaida@risda.gov.my", "rohaizam@risda.gov.my", "romli@risda.gov.my",
            "saerah@risda.gov.my", "anwar@risda.gov.my", "mudirah@risda.gov.my",
            "syahid.adil@risda.gov.my", "syahidah@risda.gov.my", "taufik.zulkefli@risda.gov.my",
            "wan.maslina@risda.gov.my", "yusaini@risda.gov.my", "yusmiza.dahlan@risda.gov.my",
            "zolkifli@risda.gov.my", "noashamz@gmail.com"
        ];

        const URL_SISTEM = "https://script.google.com/macros/s/AKfycbyUu_0DUydd6wdvgCeewNfeaGp1an7SkU-fFWBEnscKgQ4klYWjLqGGUyoLivnYn4eU/exec";

        // Fungsi Detect "Enter" key
        document.getElementById('emailInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                prosesLogin();
            }
        });

        function prosesLogin() {
            const emailInput = document.getElementById('emailInput');
            const btn = document.getElementById('loginBtn');
            const email = emailInput.value.toLowerCase().trim();

            if (!email) {
                paparMesej("Sila masukkan emel anda.", "orange");
                return;
            }

            if (senaraiPegawai.includes(email)) {
                // Visual Loading State
                btn.disabled = true;
                btn.innerText = "Sila Tunggu...";
                paparMesej("Akses Diterima! Membuka sistem...", "green");
                
                localStorage.setItem("inventorisda_email", email);

                setTimeout(() => {
    // Kita tambah ?userEmail= ke hujung URL supaya Apps Script boleh baca siapa yang masuk
    window.location.href = URL_SISTEM + "?userEmail=" + encodeURIComponent(email);
}, 1000);
            } else {
                paparMesej("Emel tidak berdaftar. Hubungi Admin.", "red");
                emailInput.focus();
            }
        }

        function paparMesej(teks, warna) {
            const msg = document.getElementById('message');
            msg.innerText = teks;
            if(warna === "green") msg.style.color = "#2ecc71";
            else if(warna === "red") msg.style.color = "#e74c3c";
            else msg.style.color = "#f39c12";
        }

        window.onload = () => {
            const savedEmail = localStorage.getItem("inventorisda_email");
            if (savedEmail) {
                document.getElementById('emailInput').value = savedEmail;
            }
        };

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('PWA v3.22 Ready'))
                .catch(err => console.log('PWA Error', err));
            });
        }
    </script>
</body>
</html>
